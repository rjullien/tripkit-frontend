server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://tripkit-backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Remote-User $http_remote_user;
        proxy_set_header Remote-Groups $http_remote_groups;

        # Strip these headers from external clients — only Authelia should set them.
        # When Authelia forwardAuth is in front, it overwrites these headers.
        # Without Authelia, a malicious client could spoof Remote-User.
        # Defense: backend Auth middleware validates JWT first; Remote-User is
        # only trusted as fallback when no Bearer token is present.

        # Prevent Cloudflare/browser from caching API responses (trip data is versioned client-side)
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    location /health {
        proxy_pass http://tripkit-backend:3001;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker — NEVER cache (browser must always check for updates)
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    # version.json — NEVER cache (used for update detection)
    location = /version.json {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    # manifest.json — short cache to pick up icon changes
    location = /manifest.json {
        expires off;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
    }

    # JS/CSS — short cache, must revalidate (SW handles offline caching)
    location ~* \.(js|css)$ {
        expires 5m;
        add_header Cache-Control "public, no-transform, must-revalidate";
    }

    # Images/fonts — long cache OK (rarely change)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
