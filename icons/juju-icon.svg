<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffa726"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  
  <!-- Subtle mountain silhouette -->
  <path d="M0 420 L120 300 L180 340 L260 260 L340 320 L400 280 L512 380 L512 512 L0 512 Z" 
        fill="#1a2233" opacity="0.6"/>
  <path d="M0 440 L160 340 L220 370 L300 300 L380 350 L512 400 L512 512 L0 512 Z" 
        fill="#141d2b" opacity="0.5"/>
  
  <!-- Compass circle -->
  <circle cx="256" cy="230" r="130" fill="none" stroke="url(#cool)" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="230" r="110" fill="none" stroke="url(#cool)" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Compass cardinal points (subtle) -->
  <!-- N -->
  <polygon points="256,105 250,135 262,135" fill="url(#warm)" opacity="0.8"/>
  <!-- S -->
  <polygon points="256,355 250,325 262,325" fill="url(#cool)" opacity="0.5"/>
  <!-- E -->
  <polygon points="381,230 351,224 351,236" fill="url(#cool)" opacity="0.5"/>
  <!-- W -->
  <polygon points="131,230 161,224 161,236" fill="url(#cool)" opacity="0.5"/>
  
  <!-- Small compass ticks -->
  <line x1="256" y1="108" x2="256" y2="118" stroke="#4ecdc4" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="342" x2="256" y2="352" stroke="#4ecdc4" stroke-width="2" opacity="0.4"/>
  <line x1="370" y1="230" x2="380" y2="230" stroke="#4ecdc4" stroke-width="2" opacity="0.4"/>
  <line x1="132" y1="230" x2="142" y2="230" stroke="#4ecdc4" stroke-width="2" opacity="0.4"/>
  
  <!-- Stylized "J" letter -->
  <text x="232" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="200" 
        font-weight="bold" font-style="italic" fill="url(#accent)" opacity="0.95">J</text>
  
  <!-- Airplane trail (curved dotted path) -->
  <path d="M310 140 Q370 160 360 200 Q350 240 380 170" 
        fill="none" stroke="#ff6b35" stroke-width="2" stroke-dasharray="4,6" opacity="0.6"/>
  
  <!-- Tiny airplane -->
  <g transform="translate(308, 136) rotate(-30)">
    <polygon points="0,-8 3,0 8,2 3,4 0,12 -3,4 -8,2 -3,0" fill="#ff6b35" opacity="0.9"/>
  </g>
  
  <!-- "adventures" subtitle -->
  <text x="256" y="410" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" 
        font-size="36" font-weight="300" letter-spacing="8" fill="#4ecdc4" opacity="0.7">ADVENTURES</text>
  
  <!-- Subtle star decorations -->
  <circle cx="100" cy="120" r="2" fill="#58a6ff" opacity="0.4"/>
  <circle cx="420" cy="100" r="1.5" fill="#ffa726" opacity="0.3"/>
  <circle cx="140" cy="180" r="1" fill="#4ecdc4" opacity="0.3"/>
  <circle cx="400" cy="310" r="1.5" fill="#58a6ff" opacity="0.3"/>
</svg>